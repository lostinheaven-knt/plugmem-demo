llm:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com
  temperature: 0.1

retrieval:
  semantic_top_k: 10
  procedural_top_k: 5
  final_semantic_k: 5
  final_procedural_k: 3

segment:
  subgoal_similarity_threshold: 0.76

limits:
  max_propositions_per_step: 3
  max_workflow_steps: 6
  max_memory_tokens: 512
